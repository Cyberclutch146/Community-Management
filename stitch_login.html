<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Terra Relief</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400..700&amp;family=Nunito+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#eae6de",
                        "on-secondary-container": "#5e5548",
                        "surface": "#faf6f0",
                        "surface-dim": "#dbd7cf",
                        "surface-bright": "#faf6f0",
                        "secondary": "#6b6358",
                        "background": "#faf6f0",
                        "tertiary-fixed": "#f8e0a8",
                        "tertiary-container": "#c4a66a",
                        "primary-fixed-dim": "#8ecf9e",
                        "primary-container": "#78a886",
                        "tertiary-fixed-dim": "#dcc48e",
                        "primary-fixed": "#c8e8d0",
                        "secondary-container": "#f0e8db",
                        "outline-variant": "#c4c8bc",
                        "on-primary-fixed-variant": "#2a6038",
                        "secondary-fixed-dim": "#d4ccbf",
                        "secondary-fixed": "#f0e8db",
                        "inverse-surface": "#2e3230",
                        "on-background": "#2e3230",
                        "on-error-container": "#690005",
                        "primary": "#4a7c59",
                        "on-tertiary-fixed-variant": "#554020",
                        "on-surface-variant": "#4a4e4a",
                        "on-secondary-fixed-variant": "#4a4538",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f0ece4",
                        "on-secondary-fixed": "#1e1a13",
                        "surface-tint": "#4a7c59",
                        "surface-container-low": "#f5f1ea",
                        "on-tertiary-container": "#554020",
                        "on-surface": "#2e3230",
                        "on-primary-container": "#d8f0de",
                        "on-tertiary-fixed": "#221a05",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#8ecf9e",
                        "inverse-on-surface": "#f5f0e8",
                        "error-container": "#ffdad8",
                        "on-primary": "#ffffff",
                        "tertiary": "#705c30",
                        "surface-variant": "#e4e0d8",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "outline": "#74796e",
                        "error": "#b83230",
                        "surface-container-highest": "#e4e0d8",
                        "on-primary-fixed": "#002110"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Literata"],
                        "body": ["Nunito Sans"],
                        "label": ["Nunito Sans"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Nunito Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Literata', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Note: TopNavBar and Footer are suppressed due to transactional intent (Login) -->
<main class="w-full max-w-5xl bg-surface-container-low rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] overflow-hidden flex flex-col md:flex-row min-h-[600px]">
<!-- Image Side (Hidden on smaller screens, 1/2 width on desktop) -->
<div class="hidden md:block md:w-1/2 relative bg-surface-variant">
<img alt="Warm organic hands holding soil with a small plant" class="absolute inset-0 w-full h-full object-cover" data-alt="Close up of hands gently holding rich dark soil with a small green seedling sprouting, soft warm sunlight, earthy and grounded mood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBF1yobusCoIcuVF0EtfpSB8WR59SuB2LtaOsDTiOv5Ie9cgeMsTy7RozrFagQflFJUUqvfnfIyVcQG5JqDvumiMbw0Q34C_886vO_S5LbiuxYFUR4_SYXMCRWZvmPLV41-wJVJD6a_mRnASkWkMGubCq3D5F3MCKY-DTO-g4MHwZSm6ienqT01RyttYGTBFwBhLaQ2KFzO3rqxr7hieu7PWOsUXr6T7N5yilCoRVIJFgje6AEwYCTaqtxqZDdNY0SsXXEljE_0dmUj"/>
<!-- Overlay to warm it up slightly if needed, though relying on the image itself is better. Subtle gradient. -->
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-8 left-8 right-8 text-white">
<div class="font-headline text-3xl font-bold mb-2">Rooted in community.</div>
<p class="font-body text-sm text-white/90 leading-relaxed">Join us in making a difference, one action at a time.</p>
</div>
</div>
<!-- Form Side -->
<div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
<div class="mb-10 text-center md:text-left">
<div class="font-headline text-primary text-3xl font-bold tracking-tight mb-2">Terra Relief</div>
<h1 class="font-headline text-2xl font-semibold text-on-surface mb-2">Welcome Back</h1>
<p class="font-body text-on-surface-variant text-sm leading-relaxed">Sign in to continue your impact journey.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body text-base placeholder:text-on-surface-variant/50 transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label text-sm font-medium text-on-surface" for="password">Password</label>
<a class="font-label text-sm font-medium text-primary hover:text-primary-container transition-colors underline underline-offset-2" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body text-base placeholder:text-on-surface-variant/50 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body text-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    New to Terra Relief? 
                    <a class="font-medium text-primary hover:text-primary-container transition-colors underline underline-offset-2" href="#">Create an account</a>
</p>
</div>
</div>
</main>
</body></html>
