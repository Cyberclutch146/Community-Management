<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Terra Outreach - Create Event</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#c4a66a",
                        "primary-fixed": "#c8e8d0",
                        "on-background": "#2e3230",
                        "tertiary-fixed-dim": "#dcc48e",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f5f0e8",

                        "on-tertiary": "#ffffff",

                        "primary-container": "#78a886",
                        "on-tertiary-fixed": "#221a05",
                        "surface-container-low": "#f5f1ea",
                        "surface": "#faf6f0",
                        "primary-fixed-dim": "#8ecf9e",
                        "on-secondary-container": "#5e5548",
                        "surface-bright": "#faf6f0",
                        "secondary": "#6b6358",
                        "primary": "#4a7c59",
                        "outline": "#74796e",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#d8f0de",
                        "surface-tint": "#4a7c59",
                        "on-primary-fixed": "#002110",
                        "on-error-container": "#690005",
                        "surface-container-highest": "#e4e0d8",
                        "error": "#b83230",
                        "surface-container": "#f0ece4",
                        "on-surface-variant": "#4a4e4a",
                        "on-secondary-fixed-variant": "#4a4538",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#f0e8db",
                        "tertiary-fixed": "#f8e0a8",
                        "surface-variant": "#e4e0d8",
                        "on-secondary-fixed": "#1e1a13",
                        "inverse-surface": "#2e3230",
                        "on-tertiary-container": "#554020",
                        "inverse-primary": "#8ecf9e",
                        "on-tertiary-fixed-variant": "#554020"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Literata", "serif"
                        ],
                        "body": [
                            "Nunito Sans", "sans-serif"
                        ],
                        "label": [
                            "Nunito Sans", "sans-serif"
                        ]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #faf6f0;
            color: #2e3230;
            line-height: 1.6;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Literata', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="bg-[#faf6f0] dark:bg-stone-900 border-b border-stone-200/50 dark:border-stone-800 shadow-[0_4px_20px_rgba(46,50,48,0.06)] flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50">
<div class="flex items-center gap-3">
<button class="text-stone-500 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline text-primary font-bold text-xl tracking-tight">Create Event</h1>
</div>
<div>
<!-- Empty placeholder for balance or specific action -->
<button class="text-primary font-body font-semibold text-sm hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors px-3 py-1.5 rounded-full active:scale-95 duration-200">
                Save
             </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="max-w-3xl mx-auto p-4 md:p-8 space-y-8">
<form class="space-y-8">
<!-- Event Basics Section -->
<section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface mb-2" for="event-name">Event Name</label>
<input class="w-full bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 px-4 py-3 text-on-surface placeholder:text-outline transition-all duration-200" id="event-name" placeholder="e.g. Community Garden Cleanup" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-2" for="event-description">Description</label>
<textarea class="w-full bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 px-4 py-3 text-on-surface placeholder:text-outline transition-all duration-200 resize-none" id="event-description" placeholder="Describe the goals and activities..." rows="4"></textarea>
</div>
</section>
<!-- Location Section (Map Picker) -->
<section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface mb-2">Location</label>
<p class="text-xs text-on-surface-variant mb-4">Tap the map to set a precise meeting point.</p>
<div class="relative w-full h-48 bg-surface-container rounded-lg overflow-hidden border border-outline-variant">
<img alt="Map View" class="w-full h-full object-cover opacity-80" data-alt="clean minimal stylized street map view with soft green and cream tones indicating urban park area" data-location="Portland" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLbh-YHJICkqMOENodcVUa6GSgARv76P3bbGD4Ri6BkoDKJPPNsB0RTpWPuaIp0wQ5TNLv-0TwYX8YoN_EKud-O3If9xdV_Nr9Nb1_rrWQ3-qgaqayoQBez_3H1tC2yl_lh-vF7MKBbw8lzQpP9ru1vaLilF3FU-aHpoEzjG5X5KTVz0YK2JC9d-71MPKTeEWONptZmjekfPuPMRD2iys_oKmHnH9pbgZkRCBgdL7aDGq1pCGjQOb2Ryd8yrj5oNtMxhqbT_sWBX9U"/>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="material-symbols-outlined text-primary text-4xl drop-shadow-md" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<div class="mt-4 flex items-center gap-3 bg-surface p-3 rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-sm text-on-surface placeholder:text-outline p-0" placeholder="Search address or park name" type="text"/>
</div>
</div>
</section>
<!-- Resource Requirements -->
<section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface mb-2">Resource Requirements</label>
<p class="text-xs text-on-surface-variant mb-4">What do you need volunteers to bring?</p>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center gap-3 p-3 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:border-primary/50 transition-colors">
<input class="rounded text-primary focus:ring-primary/20 border-outline-variant bg-surface-container-lowest w-5 h-5" type="checkbox"/>
<span class="text-sm text-on-surface">Gardening Tools</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:border-primary/50 transition-colors">
<input class="rounded text-primary focus:ring-primary/20 border-outline-variant bg-surface-container-lowest w-5 h-5" type="checkbox"/>
<span class="text-sm text-on-surface">Heavy Duty Gloves</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:border-primary/50 transition-colors">
<input class="rounded text-primary focus:ring-primary/20 border-outline-variant bg-surface-container-lowest w-5 h-5" type="checkbox"/>
<span class="text-sm text-on-surface">Vehicles/Trucks</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:border-primary/50 transition-colors">
<input class="rounded text-primary focus:ring-primary/20 border-outline-variant bg-surface-container-lowest w-5 h-5" type="checkbox"/>
<span class="text-sm text-on-surface">Snacks/Water</span>
</label>
</div>
<button class="mt-4 text-primary text-sm font-semibold flex items-center gap-2 hover:bg-surface-container-low px-3 py-2 rounded-lg transition-colors" type="button">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                        Add Custom Resource
                    </button>
</div>
</section>
<!-- Target Values / Metrics -->
<section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface mb-2">Target Values</label>
<p class="text-xs text-on-surface-variant mb-4">Set goals for this event.</p>
<div class="space-y-4">
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="groups">groups</span>
</div>
<span class="text-sm text-on-surface font-medium">Volunteers Needed</span>
</div>
<input class="w-24 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 px-3 py-2 text-center text-on-surface placeholder:text-outline transition-all duration-200" min="1" placeholder="10" type="number"/>
</div>
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="schedule">schedule</span>
</div>
<span class="text-sm text-on-surface font-medium">Estimated Hours</span>
</div>
<input class="w-24 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 px-3 py-2 text-center text-on-surface placeholder:text-outline transition-all duration-200" min="1" placeholder="4" type="number"/>
</div>
</div>
</div>
</section>
<!-- Submit Action -->
<div class="pt-4 pb-8">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary hover:text-on-primary-container font-semibold py-4 rounded-xl shadow-sm transition-colors active:scale-95 duration-200 flex items-center justify-center gap-2 text-lg" type="submit">
<span class="material-symbols-outlined" data-icon="done">done</span>
                    Publish Event
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#faf6f0]/95 dark:bg-stone-900/95 backdrop-blur-md fixed bottom-0 w-full rounded-t-3xl border-t border-stone-200/50 dark:border-stone-800 shadow-[0_-4px_20px_rgba(46,50,48,0.08)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 md:hidden">
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1 hover:text-[#4a7c59] dark:hover:text-emerald-400 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#4a7c59] dark:text-emerald-400 bg-emerald-100/50 dark:bg-emerald-900/30 rounded-xl px-4 py-1 hover:text-[#4a7c59] dark:hover:text-emerald-400 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Create</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1 hover:text-[#4a7c59] dark:hover:text-emerald-400 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1 hover:text-[#4a7c59] dark:hover:text-emerald-400 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Profile</span>
</a>
</nav>
</body></html>
