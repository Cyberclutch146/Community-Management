<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Event - Outreach &amp; Relief</title>

                    "on-surface": "#2e3230",
                    "surface-container": "#f0ece4",
                    "primary-container": "#78a886",
                    "primary": "#4a7c59",

                    "tertiary": "#705c30",
                    "on-error-container": "#690005",

                    "secondary": "#6b6358",

<style>
        body { font-family: 'Nunito Sans', sans-serif; background-color: #faf6f0; color: #2e3230; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Literata', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex">
<!-- SideNavBar (Suppressed due to form nature, but present structurally if needed. Kept hidden for "focused journey") -->
<div class="flex-1 flex flex-col h-screen overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#faf6f0] dark:bg-stone-900 docked full-width top-0 border-b border-stone-200/50 dark:border-stone-800/50 shadow-[0_4px_20px_rgba(46,50,48,0.06)] flex justify-between items-center px-6 h-16 w-full max-w-screen-2xl mx-auto z-50">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors text-[#4a7c59] dark:text-emerald-400">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-['Literata'] text-xl font-bold text-[#4a7c59] dark:text-emerald-400">Outreach &amp; Relief</span>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors text-stone-500 dark:text-stone-400">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors text-stone-500 dark:text-stone-400">
<span class="material-symbols-outlined">location_on</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto p-6 md:p-12 lg:p-16">
<div class="max-w-3xl mx-auto">
<div class="mb-10">
<h1 class="font-headline text-4xl text-on-surface mb-2">Create New Event</h1>
<p class="font-body text-on-surface-variant text-lg">Organize relief efforts and coordinate resources for your community.</p>
</div>
<form class="space-y-8 bg-surface-container-lowest p-8 rounded-xl shadow-[0_4px_20px_rgba(46,50,48,0.06)] border border-outline-variant/30">
<!-- Section: Basic Info -->
<div class="space-y-6">
<h2 class="font-headline text-xl text-primary border-b border-outline-variant/30 pb-2">Event Details</h2>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1" for="eventName">Event Name</label>
<input class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3 text-on-surface font-body" id="eventName" placeholder="e.g., Downtown Food Drive" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1" for="eventDesc">Description</label>
<textarea class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3 text-on-surface font-body resize-none" id="eventDesc" placeholder="Describe the purpose and goals of this event..." rows="4"></textarea>
</div>
</div>
<!-- Section: Location & Time -->
<div class="space-y-6 pt-4">
<h2 class="font-headline text-xl text-primary border-b border-outline-variant/30 pb-2">Location &amp; Schedule</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-semibold text-on-surface mb-1" for="eventDate">Date</label>
<input class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3 text-on-surface font-body text-stone-500" id="eventDate" type="date"/>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1" for="eventTime">Time</label>
<input class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3 text-on-surface font-body text-stone-500" id="eventTime" type="time"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-2">Location</label>
<div class="relative h-48 rounded-lg overflow-hidden border border-outline-variant/50">
<img alt="Map view" class="w-full h-full object-cover" data-alt="Stylized map view of a city area with muted green and warm cream tones, showing streets and a subtle location pin" data-location="City Map" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCe0uzZUrmZocqGxVme9Md23rEEEi3XcuFzfOmJ4Rxo0sjXlwPKA_Yze6rEcfomgMbs3pYODTUkIiH4us08Z3s4rEze_xCDbtEipcM6uEUHzcS-UNwUQ22rElDCCi701h07zFGXsPtxqfdRvZ-6dtNYfSHymm7g2iGUV9NAMWTjHhXBVKWBAax4HITcTS7jL55lMSnAejV0YIgiecJL3bwWbd2zwA36agnDTxoip-Z2CwFVO98O76dr_RZNf4mdb3vQyBbg4NdeHrgw"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/80 to-transparent flex flex-col justify-end p-4">
<div class="flex items-center bg-surface-container-lowest p-2 rounded-lg shadow-sm w-full max-w-sm">
<span class="material-symbols-outlined text-stone-400 mr-2">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-sm font-body text-on-surface p-0" placeholder="Search address..." type="text"/>
</div>
</div>
</div>
</div>
</div>
<!-- Section: Resources -->
<div class="space-y-6 pt-4">
<h2 class="font-headline text-xl text-primary border-b border-outline-variant/30 pb-2">Resource Requirements</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="bg-surface p-4 rounded-lg border border-outline-variant/30 flex items-start gap-4">
<div class="bg-primary/10 p-3 rounded-full text-primary">
<span class="material-symbols-outlined">group</span>
</div>
<div class="flex-1">
<label class="block text-sm font-semibold text-on-surface mb-1" for="volunteers">Volunteers Needed</label>
<input class="w-full bg-surface-container-lowest rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-2 text-on-surface font-body" id="volunteers" min="0" placeholder="0" type="number"/>
</div>
</div>
<div class="bg-surface p-4 rounded-lg border border-outline-variant/30 flex items-start gap-4">
<div class="bg-tertiary/10 p-3 rounded-full text-tertiary">
<span class="material-symbols-outlined">volunteer_activism</span>
</div>
<div class="flex-1">
<label class="block text-sm font-semibold text-on-surface mb-1" for="funds">Target Funds ($)</label>
<input class="w-full bg-surface-container-lowest rounded-lg border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-2 text-on-surface font-body" id="funds" min="0" placeholder="0.00" step="100" type="number"/>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="pt-8 flex items-center justify-end gap-4 border-t border-outline-variant/30">
<button class="px-6 py-3 rounded-xl font-body font-semibold text-primary hover:bg-primary/5 transition-colors" type="button">
                            Save Draft
                        </button>
<button class="px-8 py-3 rounded-xl font-body font-semibold bg-primary text-on-primary shadow-sm hover:bg-primary/90 active:scale-95 transition-all" type="submit">
                            Publish Event
                        </button>
</div>
</form>
</div>
</main>
</div>
</body></html>
